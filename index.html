<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Галерея Скинов</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 30px; background-color: #fff; color: #000; }
        h1 { font-size: 32px; margin-bottom: 20px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: purple; text-decoration: none; font-weight: bold; }
        .folder-list { list-style: none; padding: 0; }
        .folder-item { margin: 10px 0; font-size: 18px; font-weight: bold; }
        .folder-link { color: blue; text-decoration: none; display: flex; align-items: center; }
        .folder-link::before { content: "📁 "; margin-right: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 30px; margin-top: 20px; }
        .skin-card { text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: space-between; }
        .skin-name { font-weight: bold; font-size: 14px; margin-bottom: 8px; word-break: break-all; }
        .skin-img { max-width: 120px; max-height: 120px; image-rendering: pixelated; margin-bottom: 8px; object-fit: contain; }
        .copy-btn { padding: 4px 12px; font-size: 13px; background-color: #f0f0f0; border: 1px solid #ababab; border-radius: 3px; cursor: pointer; }
        .copy-btn:active { background-color: #e0e0e0; }
    </style>
</head>
<body>

    <h1>Галерея</h1>
    <div id="content">Загрузка...</div>

    <script>
        const OWNER = 'TeroserMine';
        const REPO = 'Minecraft-Skins';
        
        const contentDiv = document.getElementById('content');
        
        // Получаем параметры из URL (?path=название_папки)
        const urlParams = new URLSearchParams(window.location.search);
        const currentPath = urlParams.get('path') || '';

        async function loadGallery() {
            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/contents/${currentPath}`);
                if (!response.ok) throw new Error('Не удалось загрузить файлы');
                const items = await response.json();

                if (currentPath) {
                    contentDiv.innerHTML = `<a href="?" class="back-btn">⬅ Назад</a>`;
                } else {
                    contentDiv.innerHTML = '';
                }

                const folders = items.filter(item => item.type === 'dir');
                const files = items.filter(item => item.type === 'file' && item.name.endsWith('.png'));

                // Если есть папки, рисуем их список
                if (folders.length > 0) {
                    const ul = document.createElement('ul');
                    ul.className = 'folder-list';
                    folders.forEach(folder => {
                        const li = document.createElement('li');
                        li.className = 'folder-item';
                        li.innerHTML = `<a class="folder-link" href="?path=${encodeURIComponent(folder.path)}">${folder.name}</a>`;
                        ul.appendChild(li);
                    });
                    contentDiv.appendChild(ul);
                }

                // Если есть файлы-скины, рисуем сетку превьюшек
                if (files.length > 0) {
                    const grid = document.createElement('div');
                    grid.className = 'grid';
                    
                    files.forEach(file => {
                        const rawUrl = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${file.path}`;
                        
                        const card = document.createElement('div');
                        card.className = 'skin-card';
                        card.innerHTML = `
                            <div class="skin-name">${file.name}</div>
                            <img class="skin-img" src="${rawUrl}" alt="${file.name}">
                            <button class="copy-btn" onclick="copyToClipboard('${rawUrl}')">Copy URL</button>
                        `;
                        grid.appendChild(card);
                    });
                    contentDiv.appendChild(grid);
                }

                if (folders.length === 0 && files.length === 0) {
                    contentDiv.innerHTML += '<p>Папка пуста или не содержит .png скинов</p>';
                }

            } catch (error) {
                contentDiv.innerHTML = `<p style="color:red;">Ошибка: ${error.message}. Убедитесь, что репозиторий публичный и папки существуют.</p>`;
            }
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('Ссылка успешно скопирована!');
            }).catch(err => {
                console.error('Не удалось скопировать: ', err);
            });
        }

        loadGallery();
    </script>
</body>
</html>
